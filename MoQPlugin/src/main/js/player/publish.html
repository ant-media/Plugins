<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AMS MoQ Publisher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: sans-serif;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 { font-size: 1.3rem; margin-bottom: 14px; }
    h2 { font-size: 0.95rem; color: #aaa; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.05em; }

    moq-publish video {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      background: #111;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    /* Info panel */
    #info-panel {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 14px;
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .info-value { font-weight: 600; font-size: 13px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge-green  { background: #14532d; color: #86efac; }
    .badge-yellow { background: #713f12; color: #fde68a; }
    .badge-red    { background: #7f1d1d; color: #fca5a5; }
    .badge-blue   { background: #1e3a5f; color: #93c5fd; }
    .badge-gray   { background: #1f1f1f; color: #9ca3af; }

    /* URL probe table */
    #url-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 16px;
    }
    #url-table th {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid #2a2a2a;
      color: #666;
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
    }
    #url-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #1a1a1a;
      font-family: monospace;
    }
    .url-row.active td { background: #0d1f0d; }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot-pending { background: #444; }
    .dot-trying  { background: #f59e0b; animation: pulse 1s infinite; }
    .dot-ok      { background: #22c55e; }
    .dot-fail    { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Error / warning banners */
    .banner {
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    .banner-error  { background: #7f1d1d; color: #fca5a5; }
    .banner-warn   { background: #854d0e; color: #fef9c3; }

    /* Stream ID input */
    #stream-control {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    #stream-control > span { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    #stream-input {
      flex: 1;
      max-width: 300px;
      background: #0a0a0a;
      border: 1px solid #3a3a3a;
      border-radius: 5px;
      color: #f0f0f0;
      font-size: 13px;
      padding: 5px 10px;
      outline: none;
    }
    #stream-input:focus { border-color: #3b82f6; }

    /* Controls */
    #controls {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 13px;
    }
    #controls > span { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .source-radio { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .source-radio input[type=radio] { accent-color: #3b82f6; width: 15px; height: 15px; cursor: pointer; }
    .source-radio label { cursor: pointer; font-size: 13px; }
    .toggle-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; }
    .toggle-label input[type=checkbox] { accent-color: #3b82f6; width: 15px; height: 15px; cursor: pointer; }

    /* Publish / Stop buttons */
    #btn-row {
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 9px 22px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    #btn-publish { background: #22c55e; color: #000; }
    #btn-publish:hover:not(:disabled) { opacity: 0.85; }
    #btn-stop    { background: #ef4444; color: #fff; display: none; }
    #btn-stop:hover { opacity: 0.85; }

    /* Compat section */
    moq-publish-support { display: block; margin-bottom: 14px; }
  </style>
</head>
<body>
  <h1>AMS MoQ Publisher</h1>

  <!-- Errors injected here by JS -->
  <div id="errors"></div>

  <!-- Info bar -->
  <div id="info-panel">
    <div class="info-item">
      <span class="info-label">Broadcast</span>
      <span class="info-value" id="info-name">—</span>
    </div>
    <div class="info-item">
      <span class="info-label">Relay URL</span>
      <span class="info-value" id="info-url" style="font-family:monospace;font-size:12px">—</span>
    </div>
    <div class="info-item">
      <span class="info-label">Status</span>
      <span class="info-value" id="info-status"><span class="badge badge-gray">idle</span></span>
    </div>
  </div>

  <!-- Publisher element — preview is shown in the <video> child immediately -->
  <moq-publish id="publisher">
    <video autoplay muted playsinline></video>
  </moq-publish>

  <!-- Stream ID input -->
  <div id="stream-control">
    <span>Stream ID:</span>
    <input id="stream-input" type="text" placeholder="e.g. myStream" spellcheck="false" />
    <span id="broadcast-preview" style="color:#4ade80;font-family:monospace;font-size:12px;"></span>
  </div>

  <!-- Source / audio / video controls -->
  <div id="controls">
    <span>Source:</span>
    <label class="source-radio">
      <input type="radio" name="source" value="camera" checked />
      <span>Camera</span>
    </label>
    <label class="source-radio">
      <input type="radio" name="source" value="screen" />
      <span>Screen</span>
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="chk-muted" />
      <span>Mute audio</span>
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="chk-invisible" />
      <span>No video</span>
    </label>
  </div>

  <!-- Publish / Stop buttons -->
  <div id="btn-row">
    <button id="btn-publish">Start Publishing</button>
    <button id="btn-stop">Stop Publishing</button>
  </div>

  <!-- URL probe attempts (populated by JS) -->
  <h2>Relay URL Candidates</h2>
  <table id="url-table">
    <thead>
      <tr>
        <th>#</th>
        <th>URL</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="url-rows"></tbody>
  </table>

  <!-- Browser compatibility -->
  <h2>Browser Compatibility</h2>
  <moq-publish-support show="always"></moq-publish-support>

  <script type="module" src="publish.js"></script>
</body>
</html>
